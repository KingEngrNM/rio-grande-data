name: Daily Rio Grande Data Update

# Runs every day at 6:00 AM US Mountain Time, plus allows manual runs.
#
# NOTE on the cron schedule: GitHub Actions cron times are always in UTC,
# and GitHub does not adjust for daylight saving time. This is set for
# 6:00 AM MDT (UTC-6), so during MST (UTC-7, roughly Nov-Mar) it will run
# at 5:00 AM local time instead. Adjust the cron line below if you'd
# rather it run at 6:00 AM MST and 7:00 AM MDT (use '0 13 * * *').
on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch: {}   # adds a "Run workflow" button on the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests pandas openpyxl plotly

      - name: Run data fetcher
        run: python rio_grande_usgs.py

      - name: Assemble site folder
        run: |
          mkdir -p site
          cp index.html site/
          cp RioGrande_WaterYear_Daily.xlsx site/
          cp RioGrande_30Day_15min.xlsx site/
          cp RioGrande_Dashboard.html site/
          cp RioGrande_Dashboard_15min.html site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
